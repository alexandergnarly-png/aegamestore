<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk / Daftar - AE Game Store</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      :root {
        --primary: #0ea5e9;
        --primary-hover: #0284c7;
        --secondary: #fb7185;
        --bg-color: #f0f9ff;
        --card-bg: rgba(255, 255, 255, 0.75);
        --text-main: #0c4a6e;
        --text-muted: #475569;
        --border-color: rgba(56, 189, 248, 0.4);
        --shadow-lg: 0 24px 50px rgba(14, 165, 233, 0.15);
        --radius-xl: 28px;
        --radius-md: 14px;
        --input-bg: rgba(255, 255, 255, 0.8);
      }

      /* Dark Mode Fallback */
      @media (prefers-color-scheme: dark) {
        body.auto-dark {
          --bg-color: #0f172a;
          --card-bg: rgba(30, 41, 59, 0.85);
          --text-main: #f8fafc;
          --text-muted: #94a3b8;
          --border-color: rgba(56, 189, 248, 0.15);
          --input-bg: rgba(15, 23, 42, 0.6);
        }
      }

      body.dark-theme {
        --bg-color: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.85);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: rgba(56, 189, 248, 0.15);
        --input-bg: rgba(15, 23, 42, 0.6);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
        overflow: hidden;
        position: relative;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      /* Background Ornaments */
      .bg-blob {
        position: fixed;
        filter: blur(80px);
        z-index: -1;
        opacity: 0.5;
        border-radius: 50%;
        pointer-events: none;
      }
      .blob-1 {
        top: -10vh;
        left: -10vw;
        width: 50vw;
        height: 50vw;
        background: radial-gradient(circle, var(--primary), var(--bg-color));
      }
      .blob-2 {
        bottom: -10vh;
        right: -10vw;
        width: 40vw;
        height: 40vw;
        background: radial-gradient(circle, var(--secondary), var(--bg-color));
      }

      .auth-wrapper {
        width: 100%;
        max-width: 420px;
        animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        position: relative;
        z-index: 10;
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-xl);
        padding: 48px 36px;
        box-shadow: var(--shadow-lg);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .logo-badge {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--secondary), #f43f5e);
        color: white;
        font-size: 32px;
        box-shadow: 0 12px 24px rgba(251, 113, 133, 0.3);
        margin: 0 auto 24px;
        transform: rotate(-5deg);
        transition: transform 0.3s ease;
      }
      .card:hover .logo-badge {
        transform: rotate(0deg) scale(1.05);
      }

      h2 {
        font-size: 28px;
        font-weight: 800;
        color: var(--text-main);
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }

      p.subtitle {
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 32px;
        line-height: 1.6;
      }

      /* Modern Input Group */
      .input-group {
        position: relative;
        margin-bottom: 20px;
        text-align: left;
      }

      .input-group input {
        width: 100%;
        padding: 16px 20px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-color);
        background: var(--input-bg);
        color: var(--text-main);
        font-size: 15px;
        font-weight: 500;
        transition: all 0.3s ease;
        outline: none;
      }

      .input-group input:focus {
        border-color: var(--primary);
        background: transparent;
        box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
      }

      .password-toggle-btn {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: rgba(14, 165, 233, 0.1);
        color: var(--primary);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      .password-toggle-btn:hover {
        background: rgba(14, 165, 233, 0.2);
      }

      .input-group.has-toggle input {
        padding-right: 78px;
      }

      .forgot-password-link {
        margin-top: 12px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .forgot-password-link a {
        color: var(--primary);
        font-weight: 800;
        text-decoration: none;
        background: rgba(14, 165, 233, 0.1);
        padding: 5px 9px;
        border-radius: 999px;
      }

      .forgot-password-link a:hover {
        background: rgba(14, 165, 233, 0.2);
      }

      /* Animasi form berpindah */
      .form-container {
        display: none;
        animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .form-container.active {
        display: block;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      button.btn-primary {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: var(--radius-md);
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-hover)
        );
        color: white;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        margin-top: 8px;
        box-shadow: 0 10px 24px rgba(14, 165, 233, 0.25);
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
      }

      button.btn-primary::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          to right,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transform: skewX(-20deg);
        transition: 0.5s;
      }
      button.btn-primary:hover::after {
        left: 150%;
      }
      button.btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(14, 165, 233, 0.35);
      }
      button.btn-primary:active {
        transform: translateY(0);
      }

      .switch-form {
        margin-top: 28px;
        font-size: 14px;
        color: var(--text-muted);
      }

      .switch-form span {
        color: var(--primary);
        font-weight: 800;
        cursor: pointer;
        transition: color 0.2s;
        text-decoration: none;
        padding: 4px 8px;
        border-radius: 8px;
        background: rgba(14, 165, 233, 0.1);
      }

      .switch-form span:hover {
        background: rgba(14, 165, 233, 0.2);
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 24px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: var(--primary);
      }

      /* Sakura Effect */
      .sakura {
        position: absolute;
        top: -10%;
        z-index: 1;
        pointer-events: none;
        background: #fbcfe8;
        border-radius: 100% 0 100% 0;
        animation:
          fall linear infinite,
          sway ease-in-out infinite alternate;
      }
      @keyframes fall {
        to {
          top: 110%;
        }
      }
      @keyframes sway {
        from {
          transform: translateX(-20px) rotate(0deg);
        }
        to {
          transform: translateX(20px) rotate(45deg);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="auth-wrapper">
      <div class="card">
        <div class="logo-badge">⛩️</div>

        <!-- FORM LOGIN -->
        <div id="loginForm" class="form-container active">
          <h2>Selamat Datang 🌊</h2>
          <p class="subtitle">Masuk untuk melanjutkan petualanganmu.</p>

          <div class="input-group">
            <input
              type="text"
              id="loginUsername"
              placeholder="Username (Min. 3 huruf)"
              autocomplete="off"
            />
          </div>
          <div class="input-group has-toggle">
            <input
              type="password"
              id="loginPassword"
              placeholder="Password (Min. 6 huruf)"
            />
            <button
              type="button"
              class="password-toggle-btn"
              onclick="togglePasswordVisibility('loginPassword', this)"
            >
              Lihat
            </button>
          </div>

          <button class="btn-primary" id="btnLogin" onclick="login()">
            Masuk Sekarang
          </button>

          <div class="forgot-password-link">
            Lupa password?
            <a href="https://t.me/aegamestore" target="_blank" rel="noopener">
              Hubungi Admin
            </a>
          </div>

          <div class="switch-form">
            Belum punya akun? <span onclick="toggleForm()">Daftar Akun</span>
          </div>
        </div>

        <!-- FORM DAFTAR -->
        <div id="registerForm" class="form-container">
          <h2>Buat Akun Baru ✨</h2>
          <p class="subtitle">Daftar sekarang dan nikmati kemudahan top-up.</p>

          <div class="input-group">
            <input
              type="text"
              id="regUsername"
              placeholder="Pilih Username (Min. 3 Huruf)"
              autocomplete="off"
            />
          </div>
          <div class="input-group has-toggle">
            <input
              type="password"
              id="regPassword"
              placeholder="Buat Password (Min. 6 Huruf)"
            />
            <button
              type="button"
              class="password-toggle-btn"
              onclick="togglePasswordVisibility('regPassword', this)"
            >
              Lihat
            </button>
          </div>

          <button class="btn-primary" id="btnRegister" onclick="register()">
            Daftar Akun
          </button>

          <div class="switch-form">
            Sudah punya akun? <span onclick="toggleForm()">Masuk Sini</span>
          </div>
        </div>

        <div>
          <a href="/" class="back-link"> <span>←</span> Kembali ke Beranda </a>
        </div>
      </div>
    </div>

    <script>
      // Sinkronisasi dengan Dark Mode di halaman utama
      document.addEventListener("DOMContentLoaded", () => {
        const savedTheme = localStorage.getItem("ae_theme");
        if (savedTheme === "dark") {
          document.body.classList.add("dark-theme");
        }
        checkLoginStatus();
      });

      // Fitur Ganti Form Login/Register (Diperbarui dengan class untuk animasi)
      function toggleForm() {
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");

        if (loginForm.classList.contains("active")) {
          loginForm.classList.remove("active");
          registerForm.classList.add("active");
        } else {
          loginForm.classList.add("active");
          registerForm.classList.remove("active");
        }
      }

      async function checkLoginStatus() {
        try {
          const res = await fetch("/api/user/me");
          const data = await res.json();
          const box = document.getElementById("changePasswordBox");
          if (box && data.loggedIn) {
            box.style.display = "block";
          }
        } catch (err) {}
      }

      async function openChangePassword() {
        const result = await Swal.fire({
          title: "Ganti Password",
          html: `
            <input id="oldPasswordInput" type="password" class="swal2-input" placeholder="Password lama / random">
            <input id="newPasswordInput" type="password" class="swal2-input" placeholder="Password baru">
        `,
          showCancelButton: true,
          confirmButtonText: "Simpan",
          cancelButtonText: "Batal",
          confirmButtonColor: "#0ea5e9",
          preConfirm: () => {
            const oldPassword = document
              .getElementById("oldPasswordInput")
              .value.trim();
            const newPassword = document
              .getElementById("newPasswordInput")
              .value.trim();

            if (!oldPassword || newPassword.length < 6) {
              Swal.showValidationMessage(
                "Isi password lama dan password baru minimal 6 karakter",
              );
              return false;
            }
            return { oldPassword, newPassword };
          },
        });

        if (!result.isConfirmed) return;

        try {
          const res = await fetch("/user/change-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(result.value),
          });

          const data = await res.json();

          if (!res.ok) {
            Swal.fire("Gagal", data.message || "Gagal ganti password", "error");
            return;
          }
          Swal.fire(
            "Berhasil",
            "Password berhasil diganti. Silakan pakai password baru untuk login berikutnya.",
            "success",
          );
        } catch (err) {
          Swal.fire("Error", "Terjadi error server", "error");
        }
      }
      function togglePasswordVisibility(inputId, buttonEl) {
        const input = document.getElementById(inputId);

        if (!input || !buttonEl) return;

        const isPassword = input.type === "password";
        input.type = isPassword ? "text" : "password";
        buttonEl.innerText = isPassword ? "Sembunyi" : "Lihat";
      }
      // Tombol Enter untuk Login
      document
        .getElementById("loginPassword")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter") login();
        });

      // Fungsi Login User (Logic Tetap)
      async function login() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        const btn = document.getElementById("btnLogin");

        if (!username || !password) {
          Swal.fire({
            icon: "warning",
            title: "Oops!",
            text: "Isi username dan password dulu ya.",
            confirmButtonColor: "#0ea5e9",
          });
          return;
        }

        const originalText = btn.innerText;
        btn.innerText = "Memverifikasi... 🌊";
        btn.disabled = true;

        try {
          const res = await fetch("/user-login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();

          if (!res.ok) {
            Swal.fire({
              icon: "error",
              title: "Gagal Masuk",
              text: data.message,
              confirmButtonColor: "#fb7185",
            });
            btn.innerText = originalText;
            btn.disabled = false;
            return;
          }

          Swal.fire({
            icon: "success",
            title: "Berhasil!",
            text: "Selamat datang kembali!",
            showConfirmButton: false,
            timer: 1500,
          });
          setTimeout(() => {
            window.location.href = "/";
          }, 1500);
        } catch {
          Swal.fire({
            icon: "error",
            title: "Error",
            text: "Terjadi kesalahan server.",
            confirmButtonColor: "#fb7185",
          });
          btn.innerText = originalText;
          btn.disabled = false;
        }
      }

      // Fungsi Register User (Logic Tetap)
      async function register() {
        const username = document.getElementById("regUsername").value.trim();
        const password = document.getElementById("regPassword").value.trim();
        const btn = document.getElementById("btnRegister");

        if (username.length < 3 || password.length < 6) {
          Swal.fire({
            icon: "warning",
            title: "Tidak Valid",
            text: "Username min. 3 karakter & Password min. 6 karakter.",
            confirmButtonColor: "#0ea5e9",
          });
          return;
        }

        const originalText = btn.innerText;
        btn.innerText = "Mendaftarkan... ✨";
        btn.disabled = true;

        try {
          const res = await fetch("/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();

          if (!res.ok) {
            Swal.fire({
              icon: "error",
              title: "Gagal Daftar",
              text: data.message,
              confirmButtonColor: "#fb7185",
            });
            btn.innerText = originalText;
            btn.disabled = false;
            return;
          }

          Swal.fire({
            icon: "success",
            title: "Akun Dibuat! 🎉",
            text: "Silakan masuk menggunakan akun baru kamu.",
            confirmButtonColor: "#0ea5e9",
          }).then(() => {
            document.getElementById("loginUsername").value = username;
            document.getElementById("regPassword").value = "";
            toggleForm();
          });

          btn.innerText = originalText;
          btn.disabled = false;
        } catch {
          Swal.fire({
            icon: "error",
            title: "Error",
            text: "Terjadi kesalahan server.",
            confirmButtonColor: "#fb7185",
          });
          btn.innerText = originalText;
          btn.disabled = false;
        }
      }

      // Fitur Sakura Jatuh
      function createSakura() {
        const sakura = document.createElement("div");
        sakura.classList.add("sakura");
        const size = Math.random() * 10 + 5;
        sakura.style.width = size + "px";
        sakura.style.height = size + "px";
        sakura.style.left = Math.random() * 100 + "vw";
        sakura.style.animationDuration =
          Math.random() * 3 + 4 + "s, " + (Math.random() * 2 + 2) + "s";
        document.body.appendChild(sakura);
        setTimeout(() => {
          sakura.remove();
        }, 7000);
      }
      setInterval(createSakura, 400);
    </script>
  </body>
</html>
