<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Pembayaran - AE Game Store</title>
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --secondary: #10b981;
            --bg-color: #f0fdfa;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #064e3b;
            --text-muted: #475569;
            --border-color: rgba(16, 185, 129, 0.35);
            --shadow-lg: 0 24px 50px rgba(2, 132, 199, 0.08);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background:
                radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.18), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(2, 132, 199, 0.15), transparent 40%),
                linear-gradient(135deg, #e0f2fe, #d1fae5);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            z-index: -1;
        }

        body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(2, 132, 199, 0.08) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
            z-index: -1;
        }

        .result-wrapper {
            width: 100%;
            max-width: 460px;
            animation: fadeUp 0.6s ease-out forwards;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 40px 32px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .logo-badge {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.25);
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            color: #022c22;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .status-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 700;
            text-transform: capitalize;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .badge.pending {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fde68a;
        }

        .badge.paid {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .badge.expired {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .badge.waiting_payment {
            background: #e0f2fe;
            color: #0369a1;
            border: 1px solid #bae6fd;
        }

        .badge.delivered {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .badge.manual {
            background: #ffe4e6;
            color: #be123c;
            border: 1px solid #fecdd3;
        }

        .badge.cancelled {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .summary {
            background: rgba(255, 255, 255, 0.6);
            border: 1px dashed #6ee7b7;
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }

        .summary-item {
            padding: 10px 0;
            color: #064e3b;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 1px dashed #a7f3d0;
            word-break: break-word;
        }

        .summary-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .summary-item:first-child {
            padding-top: 0;
        }

        .key-box {
            position: relative;
            margin-top: 10px;
            padding: 24px;
            background: linear-gradient(180deg, #f0fdfa, #ffffff);
            border: 2px solid #5eead4;
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.08);
            overflow: hidden;
        }

        .key-title {
            display: inline-block;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            background: #ccfbf1;
            padding: 4px 10px;
            border-radius: 99px;
            margin-bottom: 16px;
        }

        #keyBox {
            font-size: 18px;
            font-weight: 800;
            color: #022c22;
            word-break: break-all;
            letter-spacing: 1px;
            margin-bottom: 16px;
            font-family: 'Courier New', Courier, monospace;
        }

        .copy-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(16, 185, 129, 0.3);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .helper-text {
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
            padding: 0 10px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 32px 20px;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="result-wrapper">
        <div class="card">
            <div class="logo-badge">AE</div>
            <h1>Status Pesanan</h1>
            <p class="subtitle">Berikut adalah detail pembayaran dan hasil pengiriman produk digital kamu.</p>

            <div class="status-row" id="statusRow">
                <span class="badge waiting_payment">Memuat status...</span>
            </div>

            <div class="summary">
                <div class="summary-item" id="nameText"></div>
                <div class="summary-item" id="contactText"></div>
                <div class="summary-item" id="gameText"></div>
                <div class="summary-item" id="productText"></div>
                <div class="summary-item" id="priceText"></div>
            </div>

            <div class="key-box">
                <span class="key-title">Game Key / Voucher</span>
                <div id="keyBox">Menunggu key...</div>
                <button class="copy-btn" id="copyBtn" onclick="copyKey()" style="display:none;">Copy Kode</button>
            </div>

            <p class="helper-text" id="statusText">Memuat data order...</p>
        </div>
    </div>

    <script>
        let latestGameKey = "";
        function formatRupiah(num) { return "Rp " + Number(num).toLocaleString("id-ID"); }
        function badge(status) {
            const safeStatus = String(status || "-").toLowerCase();
            return `<span class="badge ${safeStatus}">${status || "-"}</span>`;
        }
        function copyKey() {
            if (!latestGameKey) return;
            navigator.clipboard.writeText(latestGameKey).then(() => { alert("Game key berhasil dicopy!"); }).catch(() => { alert("Gagal copy key."); });
        }
        async function loadOrder() {
            const params = new URLSearchParams(window.location.search);
            const orderId = params.get("order_id");
            if (!orderId) {
                document.getElementById("statusRow").innerHTML = `<span class="badge cancelled">Data tidak lengkap</span>`;
                document.getElementById("statusText").innerText = "Data order tidak lengkap.";
                document.getElementById("keyBox").innerText = "Link order tidak valid.";
                return;
            }
            try {
                const response = await fetch("/order/" + orderId);
                const data = await response.json();
                if (!response.ok) { throw new Error(data.message || "Gagal mengambil data order"); }
                document.getElementById("statusRow").innerHTML = badge(data.payment_status) + badge(data.delivery_status);
                document.getElementById("statusText").innerText = "Order berhasil ditemukan. Simpan halaman ini untuk cek status order kamu kapan saja.";
                document.getElementById("nameText").textContent = `Nama: ${data.name || "-"}`;
                document.getElementById("contactText").textContent = `Kontak: ${data.contact || "-"}`;
                document.getElementById("gameText").textContent = `Game: ${data.game || "-"}`;
                document.getElementById("productText").textContent = `Produk: ${data.product || "-"}`;
                document.getElementById("priceText").textContent = `Harga: ${data.price ? formatRupiah(data.price) : "-"}`;
                const copyBtn = document.getElementById("copyBtn");
                if (data.delivery_status === "manual") {
                    latestGameKey = "";
                    copyBtn.style.display = "none";
                    document.getElementById("keyBox").innerText = data.gameKey || "Akan dikirim manual oleh admin";
                } else if (data.gameKey && data.gameKey !== "Akan dikirim manual oleh admin") {
                    latestGameKey = data.gameKey;
                    copyBtn.style.display = "block";
                    document.getElementById("keyBox").innerText = data.gameKey;
                } else {
                    latestGameKey = "";
                    copyBtn.style.display = "none";
                    document.getElementById("keyBox").innerHTML = `
                        <div style="font-family:Segoe UI,sans-serif;font-size:14px;font-weight:700;margin-bottom:10px;">Pembayaran belum selesai.</div>
                        <div style="font-family:Segoe UI,sans-serif;font-size:13px;font-weight:500;color:#64748b;line-height:1.6;">Jika kamu sudah membayar, tunggu beberapa saat lalu refresh halaman ini. Game key akan muncul otomatis setelah pembayaran dikonfirmasi sistem.</div>
                    `;
                }
            } catch (error) {
                document.getElementById("statusRow").innerHTML = `<span class="badge cancelled">Gagal memuat</span>`;
                document.getElementById("statusText").innerText = error.message || "Gagal mengambil data order.";
                document.getElementById("keyBox").innerText = "Data order tidak bisa dimuat.";
            }
        }
        loadOrder();
    </script>
</body>

</html>
