<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akun Saya - AE Game Store</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f0f9ff;
        font-family: "Segoe UI", sans-serif;
        color: #0c4a6e;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(56, 189, 248, 0.4);
        border-radius: 28px;
        padding: 32px;
        box-shadow: 0 24px 50px rgba(14, 165, 233, 0.15);
        text-align: center;
      }

      h1 {
        margin-bottom: 8px;
      }

      p {
        color: #475569;
      }

      input {
        width: 100%;
        padding: 15px;
        margin-top: 12px;
        border-radius: 14px;
        border: 1px solid #bae6fd;
        font-size: 14px;
        box-sizing: border-box;
      }

      button,
      a {
        width: 100%;
        display: block;
        box-sizing: border-box;
        margin-top: 14px;
        padding: 15px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        color: white;
        font-weight: 800;
        cursor: pointer;
        text-decoration: none;
        font-size: 15px;
      }

      a.secondary {
        background: white;
        color: #0284c7;
        border: 1px solid #bae6fd;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Akun Saya</h1>
      <p id="userText">Mengecek akun...</p>

      <input
        type="password"
        id="oldPassword"
        placeholder="Password lama / random"
      />
      <input
        type="password"
        id="newPassword"
        placeholder="Password baru minimal 6 karakter"
      />

      <button onclick="changePassword()">Ganti Password</button>
      <a href="/" class="secondary">Kembali ke Home</a>
    </div>

    <script>
      async function checkUser() {
        const res = await fetch("/api/user/me");
        const data = await res.json();

        if (!data.loggedIn) {
          window.location.href = "/auth";
          return;
        }

        document.getElementById("userText").innerText =
          `Login sebagai: ${data.username}`;
      }

      async function changePassword() {
        const oldPassword = document.getElementById("oldPassword").value.trim();
        const newPassword = document.getElementById("newPassword").value.trim();

        if (!oldPassword || newPassword.length < 6) {
          Swal.fire(
            "Password lama wajib diisi dan password baru minimal 6 karakter",
          );
          return;
        }

        try {
          const res = await fetch("/user/change-password", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ oldPassword, newPassword }),
          });

          const data = await res.json();

          if (!res.ok) {
            Swal.fire("Gagal", data.message || "Gagal ganti password", "error");
            return;
          }

          Swal.fire("Berhasil", "Password berhasil diganti", "success");
          document.getElementById("oldPassword").value = "";
          document.getElementById("newPassword").value = "";
        } catch (err) {
          Swal.fire("Error", "Terjadi error server", "error");
        }
      }

      checkUser();
    </script>
  </body>
</html>
