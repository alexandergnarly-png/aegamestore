<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - AE Game Store</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f0f9ff;
        background-image:
          radial-gradient(
            circle at 10% 20%,
            rgba(56, 189, 248, 0.15) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 90% 80%,
            rgba(251, 113, 133, 0.1) 0%,
            transparent 40%
          );
        color: #0c4a6e;
        overflow: hidden;
        position: relative;
      }

      .login-wrapper {
        width: 100%;
        max-width: 420px;
        padding: 20px;
        animation: fadeUp 0.6s ease-out;
        z-index: 100; /* UBAH DARI 10 MENJADI 100 (ATAU LEBIH) */
        position: relative; /* PASTIKAN ADA POSITION RELATIVE AGAR Z-INDEX BERFUNGSI */
      }

      .card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(56, 189, 248, 0.4);
        border-radius: 28px;
        box-shadow: 0 24px 50px rgba(14, 165, 233, 0.15);
        padding: 40px 32px;
        text-align: center;
      }

      .logo-badge {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #fb7185, #f43f5e);
        color: white;
        font-size: 24px;
        box-shadow: 0 12px 24px rgba(251, 113, 133, 0.3);
        margin: 0 auto 20px;
      }

      .card h2 {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
        color: #0c4a6e;
      }

      .card p.subtitle {
        color: #475569;
        font-size: 14px;
        margin-bottom: 30px;
        line-height: 1.5;
      }

      .input-group {
        position: relative;
        margin-bottom: 16px;
        text-align: left;
      }

      input {
        width: 100%;
        padding: 16px 18px;
        border-radius: 14px;
        border: 1px solid #bae6fd;
        background: rgba(255, 255, 255, 0.8);
        color: #0c4a6e;
        font-size: 14px;
        transition: all 0.2s ease;
        outline: none;
      }

      input:focus {
        border-color: #0ea5e9;
        background: #ffffff;
        box-shadow: 0 0 0 4px #e0f2fe;
      }

      input::placeholder {
        color: #94a3b8;
      }

      .password-wrap .toggle {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 13px;
        font-weight: 800;
        color: #0ea5e9;
        user-select: none;
        transition: color 0.2s;
      }

      .password-wrap .toggle:hover {
        color: #0284c7;
      }

      button {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        color: white;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        margin-top: 10px;
        box-shadow: 0 10px 20px rgba(14, 165, 233, 0.25);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(14, 165, 233, 0.35);
      }

      button:active {
        transform: translateY(0);
      }

      .footer {
        margin-top: 24px;
        font-size: 12px;
        color: #94a3b8;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      /* Sakura Effect */
      .sakura {
        position: fixed;
        top: -10%;
        z-index: 0;
        pointer-events: none;
        background: #fbcfe8;
        border-radius: 100% 0 100% 0;
        animation:
          fall linear infinite,
          sway ease-in-out infinite alternate;
      }

      @keyframes fall {
        to {
          top: 110%;
        }
      }

      @keyframes sway {
        from {
          transform: translateX(-20px) rotate(0deg);
        }

        to {
          transform: translateX(20px) rotate(45deg);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>

  <body>
    <div class="login-wrapper">
      <div class="card">
        <div class="logo-badge">⛩️</div>
        <h2>Admin Portal</h2>
        <p class="subtitle">Silakan masuk untuk mengelola AE Game Store.</p>

        <div class="input-group">
          <input
            type="text"
            id="username"
            placeholder="Username"
            autocomplete="off"
          />
        </div>

        <div class="input-group password-wrap">
          <input type="password" id="password" placeholder="Password" />
          <span class="toggle" onclick="togglePass()">Show</span>
        </div>

        <button id="loginBtn" onclick="login()">Masuk Dashboard</button>

        <div class="footer">Secure Admin Access</div>
      </div>
    </div>

    <script>
      function togglePass() {
        const input = document.getElementById("password");
        input.type = input.type === "password" ? "text" : "password";
      }

      // FITUR BARU: Bisa tekan 'Enter' untuk login
      document
        .getElementById("password")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            login();
          }
        });

      async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const btn = document.getElementById("loginBtn");

        if (!username || !password) {
          Swal.fire({
            icon: "warning",
            title: "Oops!",
            text: "Isi username dan password dulu ya.",
            confirmButtonColor: "#0ea5e9",
          });
          return;
        }

        const originalText = btn.innerText;
        btn.innerText = "Memverifikasi... 🌊";
        btn.style.opacity = "0.7";
        btn.disabled = true;

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        try {
          const res = await fetch("/admin-login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
            signal: controller.signal,
          });

          clearTimeout(timeoutId);

          let data = {};
          try {
            data = await res.json();
          } catch (_) {}

          if (!res.ok) {
            Swal.fire({
              icon: "error",
              title:
                res.status === 429
                  ? "Terlalu Banyak Percobaan"
                  : "Akses Ditolak",
              text:
                data.message ||
                (res.status === 429
                  ? "Tunggu sekitar 1 menit lalu coba lagi."
                  : "Username atau password salah."),
              confirmButtonColor: "#fb7185",
            });
            return;
          }

          btn.innerText = "Berhasil Masuk! ⛩️";
          window.location.href = "/ae-control";
        } catch (err) {
          Swal.fire({
            icon: "error",
            title: "Koneksi Bermasalah",
            text:
              err.name === "AbortError"
                ? "Request terlalu lama. Coba refresh lalu login lagi."
                : "Server tidak merespon, coba lagi nanti.",
            confirmButtonColor: "#fb7185",
          });
        } finally {
          clearTimeout(timeoutId);

          if (!window.location.href.includes("/ae-control")) {
            btn.innerText = originalText;
            btn.style.opacity = "1";
            btn.disabled = false;
          }
        }
      }

      // Fitur Sakura Jatuh
      function createSakura() {
        const sakura = document.createElement("div");
        sakura.classList.add("sakura");
        const size = Math.random() * 10 + 5;
        sakura.style.width = size + "px";
        sakura.style.height = size + "px";
        sakura.style.left = Math.random() * 100 + "vw";
        sakura.style.animationDuration =
          Math.random() * 3 + 4 + "s, " + (Math.random() * 2 + 2) + "s";
        document.body.appendChild(sakura);
        setTimeout(() => {
          sakura.remove();
        }, 7000);
      }
      setInterval(createSakura, 400);
    </script>
  </body>
</html>
