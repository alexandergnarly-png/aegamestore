<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - AE Game Store</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      :root {
        --primary: #0ea5e9;
        --primary-hover: #0284c7;
        --secondary: #fb7185;
        --bg-color: #f0f9ff;
        --card-bg: rgba(255, 255, 255, 0.75);
        --text-main: #0c4a6e;
        --text-muted: #475569;
        --border-color: rgba(56, 189, 248, 0.4);
        --shadow-lg: 0 24px 50px rgba(14, 165, 233, 0.15);
        --radius-xl: 28px;
        --radius-md: 14px;
        --input-bg: rgba(255, 255, 255, 0.8);
      }

      /* Dark Mode Support */
      @media (prefers-color-scheme: dark) {
        body.auto-dark {
          --bg-color: #0f172a;
          --card-bg: rgba(30, 41, 59, 0.85);
          --text-main: #f8fafc;
          --text-muted: #94a3b8;
          --border-color: rgba(56, 189, 248, 0.15);
          --input-bg: rgba(15, 23, 42, 0.6);
        }
      }

      body.dark-theme {
        --bg-color: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.85);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: rgba(56, 189, 248, 0.15);
        --input-bg: rgba(15, 23, 42, 0.6);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
        overflow: hidden;
        position: relative;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      /* Modern Blurred Background Blobs */
      .bg-blob {
        position: fixed;
        filter: blur(80px);
        z-index: -1;
        opacity: 0.5;
        border-radius: 50%;
        pointer-events: none;
      }
      .blob-1 {
        top: -10vh;
        left: -10vw;
        width: 50vw;
        height: 50vw;
        background: radial-gradient(circle, var(--primary), var(--bg-color));
      }
      .blob-2 {
        bottom: -10vh;
        right: -10vw;
        width: 40vw;
        height: 40vw;
        background: radial-gradient(circle, var(--secondary), var(--bg-color));
      }

      .login-wrapper {
        width: 100%;
        max-width: 420px;
        animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        position: relative;
        z-index: 100;
      }

      .card {
        background: var(--card-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-xl);
        padding: 48px 36px;
        box-shadow: var(--shadow-lg);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      /* Aksen garis atas pada card */
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, var(--secondary), #f43f5e);
      }

      .logo-badge {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--secondary), #f43f5e);
        color: white;
        font-size: 32px;
        box-shadow: 0 12px 24px rgba(251, 113, 133, 0.3);
        margin: 0 auto 24px;
        transform: rotate(-5deg);
        transition: transform 0.3s ease;
      }
      .card:hover .logo-badge {
        transform: rotate(0deg) scale(1.05);
      }

      .card h2 {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
        color: var(--text-main);
      }

      .card p.subtitle {
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 32px;
        line-height: 1.6;
      }

      .input-group {
        position: relative;
        margin-bottom: 20px;
        text-align: left;
      }

      input {
        width: 100%;
        padding: 16px 20px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-color);
        background: var(--input-bg);
        color: var(--text-main);
        font-size: 15px;
        font-weight: 500;
        transition: all 0.3s ease;
        outline: none;
      }

      input:focus {
        border-color: var(--primary);
        background: transparent;
        box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
      }

      input::placeholder {
        color: #94a3b8;
      }

      .password-wrap .toggle {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 13px;
        font-weight: 800;
        color: var(--primary);
        user-select: none;
        transition: color 0.2s;
        background: transparent;
      }

      .password-wrap .toggle:hover {
        color: var(--primary-hover);
      }

      button {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: var(--radius-md);
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-hover)
        );
        color: white;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        margin-top: 8px;
        box-shadow: 0 10px 24px rgba(14, 165, 233, 0.25);
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
      }

      button::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 50%;
        height: 100%;
        background: linear-gradient(
          to right,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transform: skewX(-20deg);
        transition: 0.5s;
      }
      button:hover::after {
        left: 150%;
      }
      button:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(14, 165, 233, 0.35);
      }
      button:active {
        transform: translateY(0);
      }

      .footer {
        margin-top: 28px;
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      /* Sakura Effect */
      .sakura {
        position: fixed;
        top: -10%;
        z-index: 0;
        pointer-events: none;
        background: #fbcfe8;
        border-radius: 100% 0 100% 0;
        animation:
          fall linear infinite,
          sway ease-in-out infinite alternate;
      }

      @keyframes fall {
        to {
          top: 110%;
        }
      }
      @keyframes sway {
        from {
          transform: translateX(-20px) rotate(0deg);
        }
        to {
          transform: translateX(20px) rotate(45deg);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="login-wrapper">
      <div class="card">
        <div class="logo-badge">⛩️</div>
        <h2>Admin Portal</h2>
        <p class="subtitle">Silakan masuk untuk mengelola AE Game Store.</p>

        <div class="input-group">
          <input
            type="text"
            id="username"
            placeholder="Username Admin"
            autocomplete="off"
          />
        </div>

        <div class="input-group password-wrap">
          <input type="password" id="password" placeholder="Password Admin" />
          <span class="toggle" onclick="togglePass()">Show</span>
        </div>

        <button id="loginBtn" onclick="login()">Masuk Dashboard</button>

        <div class="footer">🔒 Secure Admin Access</div>
      </div>
    </div>

    <script>
      // Sinkronisasi tema dengan web utama (Opsional, membaca localStorage user)
      document.addEventListener("DOMContentLoaded", () => {
        const savedTheme = localStorage.getItem("ae_theme");
        if (savedTheme === "dark") {
          document.body.classList.add("dark-theme");
        }
      });

      function togglePass() {
        const input = document.getElementById("password");
        const toggleBtn = document.querySelector(".toggle");
        if (input.type === "password") {
          input.type = "text";
          toggleBtn.innerText = "Hide";
        } else {
          input.type = "password";
          toggleBtn.innerText = "Show";
        }
      }

      // Bisa tekan 'Enter' untuk login
      document
        .getElementById("password")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            login();
          }
        });

      async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const btn = document.getElementById("loginBtn");

        if (!username || !password) {
          Swal.fire({
            icon: "warning",
            title: "Oops!",
            text: "Isi username dan password dulu ya.",
            confirmButtonColor: "#0ea5e9",
          });
          return;
        }

        const originalText = btn.innerText;
        btn.innerText = "Memverifikasi... 🌊";
        btn.style.opacity = "0.7";
        btn.disabled = true;

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        try {
          const res = await fetch("/admin-login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
            signal: controller.signal,
          });

          clearTimeout(timeoutId);

          let data = {};
          try {
            data = await res.json();
          } catch (_) {}

          if (!res.ok) {
            Swal.fire({
              icon: "error",
              title:
                res.status === 429
                  ? "Terlalu Banyak Percobaan"
                  : "Akses Ditolak",
              text:
                data.message ||
                (res.status === 429
                  ? "Tunggu sekitar 1 menit lalu coba lagi."
                  : "Username atau password salah."),
              confirmButtonColor: "#fb7185",
            });
            return;
          }

          btn.innerText = "Berhasil Masuk! ⛩️";
          window.location.href = "/ae-control";
        } catch (err) {
          Swal.fire({
            icon: "error",
            title: "Koneksi Bermasalah",
            text:
              err.name === "AbortError"
                ? "Request terlalu lama. Coba refresh lalu login lagi."
                : "Server tidak merespon, coba lagi nanti.",
            confirmButtonColor: "#fb7185",
          });
        } finally {
          clearTimeout(timeoutId);

          if (!window.location.href.includes("/ae-control")) {
            btn.innerText = originalText;
            btn.style.opacity = "1";
            btn.disabled = false;
          }
        }
      }

      // Fitur Sakura Jatuh
      function createSakura() {
        const sakura = document.createElement("div");
        sakura.classList.add("sakura");
        const size = Math.random() * 10 + 5;
        sakura.style.width = size + "px";
        sakura.style.height = size + "px";
        sakura.style.left = Math.random() * 100 + "vw";
        sakura.style.animationDuration =
          Math.random() * 3 + 4 + "s, " + (Math.random() * 2 + 2) + "s";
        document.body.appendChild(sakura);
        setTimeout(() => {
          sakura.remove();
        }, 7000);
      }
      setInterval(createSakura, 400);
    </script>
  </body>
</html>
