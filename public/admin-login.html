<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AE Game Store</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top left, rgba(16, 185, 129, 0.25), transparent 40%),
                radial-gradient(circle at bottom right, rgba(2, 132, 199, 0.2), transparent 40%),
                linear-gradient(135deg, #e0f2fe, #d1fae5);
            /* Vibe lautan biru ke hutan hijau */
            color: #064e3b;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(2, 132, 199, 0.1) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            z-index: -1;
        }

        body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
            z-index: -1;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeUp 0.6s ease-out;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(16, 185, 129, 0.4);
            border-radius: 28px;
            box-shadow: 0 24px 70px rgba(2, 132, 199, 0.12);
            padding: 40px 32px;
            text-align: center;
        }

        .logo-badge {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0284c7, #10b981);
            color: white;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.3);
            margin: 0 auto 20px;
        }

        .card h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            color: #022c22;
        }

        .card p.subtitle {
            color: #475569;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid #99f6e4;
            background: #f0fdfa;
            color: #022c22;
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: #2dd4bf;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(45, 212, 191, 0.15);
        }

        input::placeholder {
            color: #94a3b8;
        }

        .password-wrap .toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: #0284c7;
            user-select: none;
            transition: color 0.2s;
        }

        .password-wrap .toggle:hover {
            color: #0369a1;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #0284c7, #10b981);
            color: white;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(16, 185, 129, 0.35);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 16px;
            font-size: 13px;
            color: #e11d48;
            font-weight: 600;
            min-height: 20px;
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <div class="card">
            <div class="logo-badge">AE</div>
            <h2>Admin Portal</h2>
            <p class="subtitle">Silakan masuk untuk mengelola AE Game Store.</p>

            <div class="input-group">
                <input type="text" id="username" placeholder="Username" autocomplete="off">
            </div>

            <div class="input-group password-wrap">
                <input type="password" id="password" placeholder="Password">
                <span class="toggle" onclick="togglePass()">Show</span>
            </div>

            <button onclick="login()">Masuk Dashboard</button>

            <div class="status" id="status"></div>

            <div class="footer">
                Secure Admin Access
            </div>
        </div>
    </div>

    <script>
        // Logic ini tidak diubah sama sekali sesuai permintaan
        function togglePass() {
            const input = document.getElementById("password");
            input.type = input.type === "password" ? "text" : "password";
        }

        async function login() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const status = document.getElementById("status");

            status.innerText = "";

            if (!username || !password) {
                status.innerText = "Isi semua field";
                return;
            }

            try {
                const res = await fetch("/admin-login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    status.innerText = data.message || "Login gagal";
                    return;
                }

                window.location.href = "/ae-control";
            } catch {
                status.innerText = "Server error";
            }
        }
    </script>

</body>

</html>
