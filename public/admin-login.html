<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - AE Game Store</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    background: linear-gradient(135deg, #0f172a, #1e293b);
}

/* ===== LEFT SIDE ===== */
.left {
    flex: 1;
    background:
        linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.2)),
        url("https://images.unsplash.com/photo-1605902711622-cfb43c4437d1?q=80&w=1600&auto=format&fit=crop");
    background-size: cover;
    background-position: center;
    color: white;
    display: flex;
    align-items: flex-end;
    padding: 40px;
}

.left-content {
    max-width: 400px;
}

.left h1 {
    margin: 0;
    font-size: 32px;
}

.left p {
    margin-top: 10px;
    opacity: 0.85;
    line-height: 1.6;
}

/* ===== RIGHT SIDE ===== */
.right {
    flex: 1;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    width: 100%;
    max-width: 360px;
}

.card h2 {
    margin-bottom: 10px;
}

.card p {
    color: #64748b;
    font-size: 14px;
    margin-bottom: 25px;
}

/* INPUT */
.input-group {
    margin-bottom: 16px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: #2563eb;
}

/* PASSWORD TOGGLE */
.password-wrap {
    position: relative;
}

.toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 12px;
    color: #2563eb;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #1d4ed8;
}

/* STATUS */
.status {
    margin-top: 12px;
    font-size: 14px;
    color: red;
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #94a3b8;
    text-align: center;
}

/* MOBILE */
@media(max-width: 900px) {
    .left {
        display: none;
    }
}
</style>
</head>

<body>

<div class="left">
    <div class="left-content">
        <h1>AE Game Store</h1>
        <p>Admin portal untuk mengelola produk, key, dan transaksi dengan aman dan cepat.</p>
    </div>
</div>

<div class="right">
    <div class="card">
        <h2>Login Admin</h2>
        <p>Masukkan kredensial untuk akses dashboard</p>

        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>

        <div class="input-group password-wrap">
            <input type="password" id="password" placeholder="Password">
            <span class="toggle" onclick="togglePass()">Show</span>
        </div>

        <button onclick="login()">Login</button>

        <div class="status" id="status"></div>

        <div class="footer">
            Secure Admin Access
        </div>
    </div>
</div>

<script>
function togglePass() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const status = document.getElementById("status");

    status.innerText = "";

    if (!username || !password) {
        status.innerText = "Isi semua field";
        return;
    }

    try {
        const res = await fetch("/admin-login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
            status.innerText = data.message || "Login gagal";
            return;
        }

        window.location.href = "/ae-control";
    } catch {
        status.innerText = "Server error";
    }
}
</script>

</body>
</html>
